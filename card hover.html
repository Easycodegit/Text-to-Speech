<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            height: 100vh;
            width: 100vw;
            max-height: 800px;
            max-width: 1280px;
            min-height: 600px;
            min-width: 1000px;
            justify-content: space-around;
            align-items: center;
            margin: 0 auto;
        }
        .border {
            height: 369px;
            width: 290px;
            background: transparent;
            border-radius: 10px;
            transition: border 1s;
            position: relative;
        }
        .card {
            height: 379px;
            width: 300px;
            border-radius: 10px;
            transition: background 0.9s;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .card0 {
            background: url("/h.jpg") center 
            center no-repeat;
            background-size: 600px;
        }
        .card0:hover {
            background: url("random.png")  left 
            center no-repeat;
            background-position-x: left;
            background-size: 400px;
        }
        .card0 {
            background: url("random.png") center 
            center no-repeat;
            background-size: 600px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card card0">
        </div>
        <h2>DOG HOVER</h2>
    </div>
</body>
</html>
